<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — FR Automation SRL</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0B1929;--cyan:#00AEEF;--text-hi:#F0F5FA;--text-mid:#8AAABF}
    *{margin:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text-hi);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .code{font-family:'Barlow Condensed',sans-serif;font-size:clamp(80px,18vw,160px);font-weight:700;line-height:1;color:var(--cyan)}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,4vw,34px);font-weight:600;margin:8px 0 12px}
    p{color:var(--text-mid);margin-bottom:28px;font-size:17px}
    a{display:inline-block;background:var(--cyan);color:var(--navy);text-decoration:none;font-weight:600;padding:14px 32px;border-radius:6px;transition:transform .2s}
    a:hover{transform:scale(.98)}
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscás no existe o fue movida.</p>
    <a href="index.html">Volver al inicio</a>
  </div>
</body>
</html>
